groups:
  - name: gpuwatch_rules
    interval: 5s
    rules:

      # SM clock drop from recent max (throttle onset signal)
      - record: gpuwatch:sm_clock_drop
        expr: |
          max_over_time(DCGM_FI_DEV_SM_CLOCK[5m]) - DCGM_FI_DEV_SM_CLOCK

      # SM clock as fraction of 5-min max (1.0 = healthy, <0.92 = throttled)
      - record: gpuwatch:sm_clock_ratio
        expr: |
          DCGM_FI_DEV_SM_CLOCK / max_over_time(DCGM_FI_DEV_SM_CLOCK[5m])

      # GPU memory utilization %
      - record: gpuwatch:mem_util_pct
        expr: |
          100 * DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_TOTAL

      # vLLM P95 TTFT (milliseconds)
      - record: gpuwatch:ttft_p95_ms
        expr: |
          1000 * histogram_quantile(0.95,
            rate(vllm:time_to_first_token_seconds_bucket[1m])
          )

      # vLLM P50 TTFT (milliseconds)
      - record: gpuwatch:ttft_p50_ms
        expr: |
          1000 * histogram_quantile(0.50,
            rate(vllm:time_to_first_token_seconds_bucket[1m])
          )

      # Token throughput (tokens/sec)
      - record: gpuwatch:token_throughput
        expr: |
          rate(vllm:generation_tokens_total[1m])

      # Request throughput (req/sec)
      - record: gpuwatch:request_rate
        expr: |
          rate(vllm:request_success_total[1m])

      # Temperature rate of change (C/min)
      - record: gpuwatch:temp_slope
        expr: |
          60 * deriv(DCGM_FI_DEV_GPU_TEMP[2m])

      # Power rate of change (W/min)
      - record: gpuwatch:power_slope
        expr: |
          60 * deriv(DCGM_FI_DEV_POWER_USAGE[2m])
